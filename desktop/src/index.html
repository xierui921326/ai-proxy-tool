<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Proxy</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif; margin: 16px; color: #222; }
      .row { display: flex; gap: 16px; flex-wrap: wrap; }
      .card { border: 1px solid #e5e7eb; border-radius: 8px; padding: 12px; flex: 1; min-width: 280px; }
      .title { font-weight: 600; margin-bottom: 8px; }
      .grid { display: grid; grid-template-columns: 160px 1fr; gap: 8px 12px; align-items: center; }
      input { width: 100%; padding: 6px 8px; border: 1px solid #d1d5db; border-radius: 6px; }
      button { padding: 8px 12px; border: 1px solid #2563eb; background: #2563eb; color: #fff; border-radius: 6px; cursor: pointer; }
      button.secondary { background: #fff; color: #2563eb; }
      .actions { display: flex; gap: 8px; flex-wrap: wrap; }
      #log { white-space: pre-wrap; background: #0b1020; color: #e5e7eb; padding: 8px; border-radius: 6px; height: 160px; overflow: auto; }
    </style>
  </head>
  <body>
    <h2 style="margin:0 0 12px 0;">AI Proxy 控制台</h2>
    <div class="row">
      <div class="card">
        <div class="title">代理服务状态</div>
        <div class="grid">
          <label>HTTP 端口</label>
          <input id="listen" placeholder="127.0.0.1:8777" />
          <label>TLS 端口</label>
          <input id="tls_listen" placeholder="127.0.0.1:9443" />
        </div>
        <div class="actions" style="margin-top:10px;">
          <button id="start">启动</button>
          <button id="applyHosts" class="secondary">接管 hosts</button>
          <button id="revertHosts" class="secondary">释放 hosts</button>
        </div>
        <div style="margin-top:10px;display:flex;gap:8px;align-items:center;">
          <span>服务状态:</span>
          <span id="svcStatus" style="padding:2px 8px;border-radius:12px;background:#fee2e2;color:#991b1b;">未启动</span>
          <span>hosts 状态:</span>
          <span id="hostsStatus" style="padding:2px 8px;border-radius:12px;background:#fef3c7;color:#92400e;">未知</span>
        </div>
      </div>
      <div class="card">
        <div class="title">HTTPS 解密证书</div>
        <div class="grid">
          <label>Root CA</label>
          <input id="caPath" readonly placeholder="点击获取路径" />
        </div>
        <div class="actions" style="margin-top:10px;">
          <button id="exportCA" class="secondary">导出路径</button>
          <small style="color:#6b7280;">请将根证书导入系统信任</small>
        </div>
      </div>
    </div>

    <div class="row" style="margin-top:16px;">
      <div class="card" style="flex:2;">
        <div class="title">路由转发规则</div>
        <div class="grid">
          <label>OpenAI 上游</label>
          <input id="openai" placeholder="https://api.openai.com" />
          <label>Anthropic 上游</label>
          <input id="anthropic" placeholder="https://api.anthropic.com" />
          <label>软件路径</label>
          <input id="appPath" placeholder="/Applications/YourApp.app" />
        </div>
        <div class="actions" style="margin-top:10px;">
          <button id="launch">拉起</button>
          <button id="save" class="secondary">保存配置</button>
          <button id="clear" class="secondary">清理数据</button>
        </div>
      </div>
      <div class="card" style="flex:1;">
        <div class="title">日志</div>
        <div id="log"></div>
      </div>
    </div>

    <script type="module" src="./index.js"></script>
  </body>
  </html>
